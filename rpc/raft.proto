// Raft inter-node RPCs, following Figure 2 of the Raft paper
// (Ongaro & Ousterhout, "In Search of an Understandable Consensus Algorithm").
//
// Deviations from the paper, made deliberately:
//
//   1. Node IDs are strings, not integers. The paper uses abstract integer
//      server IDs; strings let us use human-readable IDs from the cluster
//      config ("node1", "node2", ...) which makes logs and tests far easier
//      to read. Nothing in the algorithm depends on IDs being ordered.
//
//   2. LogEntry carries an explicit `index`. In the paper the index is
//      implicit in the entry's position in the log. Carrying it on the wire
//      costs a few bytes but makes AppendEntries handlers and debug output
//      unambiguous, and becomes genuinely necessary once snapshotting
//      truncates the log prefix (Phase 5) and "position in slice" no longer
//      equals "log index".
//
//   3. AppendEntriesResponse has conflict_index/conflict_term. These are the
//      fast log-backtracking optimization from §5.3 of the paper ("the
//      follower can include the term of the conflicting entry and the first
//      index it stores for that term"). Figure 2 proper only has {term,
//      success}. The fields are declared now so the wire format doesn't have
//      to change later; they stay unused until log replication (Phase 2/3).
//
// Terms and log indexes are uint64. They start at 0 (a brand-new cluster is
// at term 0 with an empty log whose "last index" is 0) and only ever grow.

syntax = "proto3";

package raftpb;

option go_package = "github.com/Abdullah-A-Qazi/RaftDB/rpc/raftpb";

// A single replicated log entry (Figure 2: "each entry contains command for
// state machine, and term when entry was received by leader").
message LogEntry {
  // Term when the entry was received by the leader. Used to detect
  // inconsistencies between logs (Log Matching Property).
  uint64 term = 1;

  // Position of this entry in the log, 1-based (deviation #2 above).
  uint64 index = 2;

  // Opaque state-machine command. The KV encoding (Put/Get/Delete) is
  // defined in Phase 2; Raft itself never inspects this.
  bytes command = 3;
}

// ---------------------------------------------------------------------------
// RequestVote RPC — invoked by candidates to gather votes (§5.2).
// ---------------------------------------------------------------------------

message RequestVoteRequest {
  // Candidate's term.
  uint64 term = 1;

  // Candidate requesting the vote.
  string candidate_id = 2;

  // Index of candidate's last log entry (§5.4). Together with
  // last_log_term this is what the election restriction compares.
  uint64 last_log_index = 3;

  // Term of candidate's last log entry (§5.4).
  uint64 last_log_term = 4;
}

message RequestVoteResponse {
  // The voter's currentTerm, for the candidate to update itself if it is
  // stale.
  uint64 term = 1;

  // True means the candidate received the vote.
  bool vote_granted = 2;
}

// ---------------------------------------------------------------------------
// AppendEntries RPC — invoked by the leader to replicate log entries (§5.3);
// also used as heartbeat with an empty entries list (§5.2).
// ---------------------------------------------------------------------------

message AppendEntriesRequest {
  // Leader's term.
  uint64 term = 1;

  // So followers can redirect clients to the leader.
  string leader_id = 2;

  // Index of the log entry immediately preceding the new ones. The
  // follower rejects the request unless it has an entry at this index with
  // matching term (the consistency check that enforces Log Matching).
  uint64 prev_log_index = 3;

  // Term of the entry at prev_log_index.
  uint64 prev_log_term = 4;

  // Log entries to store. Empty for heartbeats; may send more than one at a
  // time for efficiency.
  repeated LogEntry entries = 5;

  // Leader's commitIndex. Followers advance their own commitIndex to
  // min(leader_commit, index of last new entry).
  uint64 leader_commit = 6;
}

message AppendEntriesResponse {
  // The follower's currentTerm, for the leader to update itself if stale.
  uint64 term = 1;

  // True if the follower contained an entry matching prev_log_index and
  // prev_log_term (and therefore accepted the entries).
  bool success = 2;

  // Fast-backtracking hints (deviation #3 above; unused until Phase 2/3).
  // On a consistency-check failure: conflict_term is the term of the
  // follower's entry at prev_log_index (0 if the follower's log is too
  // short), and conflict_index is the first index the follower stores for
  // that term (or the follower's last index + 1 if its log is too short).
  uint64 conflict_index = 3;
  uint64 conflict_term = 4;
}

// ---------------------------------------------------------------------------
// InstallSnapshot RPC — invoked by the leader to send a snapshot to a
// follower that has fallen so far behind that the entries it needs have been
// compacted away (§7). Implemented in Phase 5.
// ---------------------------------------------------------------------------

message InstallSnapshotRequest {
  // Leader's term.
  uint64 term = 1;

  // So the follower can redirect clients.
  string leader_id = 2;

  // The snapshot replaces all log entries up through and including this
  // index...
  uint64 last_included_index = 3;

  // ...and this is the term of that last included entry. Both must be
  // retained after compaction because the AppendEntries consistency check
  // for the entry immediately after the snapshot needs them.
  uint64 last_included_term = 4;

  // Byte offset where this chunk is positioned in the snapshot file.
  uint64 offset = 5;

  // Raw bytes of the snapshot chunk, starting at offset.
  bytes data = 6;

  // True if this is the last chunk.
  bool done = 7;
}

message InstallSnapshotResponse {
  // The follower's currentTerm, for the leader to update itself if stale.
  uint64 term = 1;
}

// The Raft service exposed by every node to its peers. Client-facing
// Put/Get/Delete traffic is a separate service, defined in Phase 2.
service Raft {
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);
}
