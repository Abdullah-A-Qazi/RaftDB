// Client-facing key-value API. This is a separate service (and, on each
// node, a separate listener — client_addr vs raft_addr) from the inter-node
// Raft RPCs in raft.proto.
//
// Leader redirection: any node answers any request, but only the leader can
// serve it. A non-leader responds with `redirect` filled in, pointing the
// client at the leader's client address; the client is expected to retry
// there. This is a deliberate deviation from designs that proxy the request
// to the leader server-side: redirection keeps the failure story simple
// (every hop is client-visible) at the cost of one extra round trip after a
// leadership change.

syntax = "proto3";

package kvpb;

option go_package = "github.com/Abdullah-A-Qazi/RaftDB/rpc/kvpb";

// Redirect is set on any response from a node that is not the current
// leader. leader_addr may be empty if no leader is known yet (e.g. during
// an election) — the client should back off and retry anywhere.
message Redirect {
  string leader_id = 1;
  string leader_addr = 2;
}

message PutRequest {
  string key = 1;
  string value = 2;
}

message PutResponse {
  Redirect redirect = 1;
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  Redirect redirect = 1;
  string value = 2;
  bool found = 3;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  Redirect redirect = 1;
}

// Status reports one node's own view of the world — served locally by any
// node (leader or not), so a dashboard/CLI can render the whole cluster by
// asking everyone. Values are this node's opinion and can lag or disagree
// across nodes during elections/partitions; that disagreement is the
// interesting part to display, not an error.
message StatusRequest {}

message StatusResponse {
  string node_id = 1;
  string state = 2; // "Follower" | "Candidate" | "Leader"
  uint64 current_term = 3;
  string voted_for = 4;
  string leader_id = 5;
  uint64 commit_index = 6;
  uint64 last_applied = 7;
  uint64 last_log_index = 8;
  uint64 last_log_term = 9;
  uint64 first_log_index = 10; // >1 means the log was compacted into a snapshot
  uint64 keys = 11;            // entries in the KV state machine
}

service KV {
  // Put and Delete go through the Raft log and return only after the
  // command is committed (majority-replicated) and applied.
  rpc Put(PutRequest) returns (PutResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);

  // Get is served from the leader's local state machine WITHOUT going
  // through the log. See docs/phase-2 for why this is not strictly
  // linearizable (a just-deposed leader can serve a stale read) and what
  // the fixes are (ReadIndex/leases — future work).
  rpc Get(GetRequest) returns (GetResponse);

  // Status is answered by every node about itself (no redirect).
  rpc Status(StatusRequest) returns (StatusResponse);
}
